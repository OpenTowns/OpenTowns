plugins {
    id 'java'
    id 'application'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

// Original source layout is kept as-is:
// src/ holds the xaos/ package tree next to the runtime data and libs.
sourceSets {
    main {
        java {
            srcDirs = ['src']
            exclude 'data/**'
            exclude 'lib/**'
        }
        resources {
            srcDirs = []
        }
    }
}

dependencies {
    // Vendored jars from the original Steam install (src/lib is gitignored).
    // xaos.jar is the original compiled game: reference only, must never
    // be on the classpath or it can shadow the freshly built classes.
    implementation fileTree(dir: 'src/lib', include: '*.jar', exclude: 'xaos.jar')
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

application {
    mainClass = 'xaos.Towns'
}

tasks.named('run') {
    // The game resolves towns.ini, graphics.ini, audio.ini and data/
    // relative to the working directory; lib/native holds the LWJGL,
    // OpenAL, jinput and steam_api DLLs.
    workingDir = file('src')
    jvmArgs '-Djava.library.path=lib/native'
    // JDK 25: JNA and LWJGL 2 load native code from the unnamed module;
    // restricted native access will be blocked by default in a future JDK.
    jvmArgs '--enable-native-access=ALL-UNNAMED'
    // JDK 25: LWJGL 2 (MemoryUtilSun) still uses sun.misc.Unsafe memory
    // access, deprecated for removal (JEP 498). The LWJGL 3 port removes
    // this dependency; until then, opt in explicitly.
    jvmArgs '--sun-misc-unsafe-memory-access=allow'
}
